code: CSML
title: Case Studies in Machine Learning
catalogNumber: AI 391M
type: elective
hoursPerWeek: "8-10"
semester: spring-2027
status: planned
credits: 3
accent: "#ef6f9e"
order: 5
summary: >-
  An applied counterpart to the core machine learning course, organized around real-world
  datasets and end-to-end case studies. The emphasis is on the messy parts that theory
  glosses over: data cleaning and feature engineering, principled model selection,
  evaluation under realistic constraints, reproducibility, and the practical concerns of
  taking a model from notebook to deployment.
focusAreas:
  - Applied ML workflows
  - Data cleaning & feature engineering
  - Model selection
  - Evaluation in practice
  - Reproducibility
  - Deployment considerations
tools:
  - Python
  - scikit-learn
  - pandas
  - Matplotlib
  - Jupyter
