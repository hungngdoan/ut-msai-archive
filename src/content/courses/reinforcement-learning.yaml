summary: >-
  How agents learn to act by interacting with an environment and maximizing long-run
  reward. The course builds from the Markov decision process formalism through dynamic
  programming, Monte Carlo and temporal-difference methods, and Q-learning, then extends
  into policy-gradient algorithms and deep reinforcement learning where neural networks
  approximate value functions and policies.
focusAreas:
  - Markov decision processes
  - Dynamic programming
  - Monte Carlo methods
  - Temporal-difference learning
  - Q-learning
  - Policy gradients
  - Deep reinforcement learning
