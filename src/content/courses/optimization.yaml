summary: >-
  The mathematical machinery underneath model training. The course covers convex sets and
  functions, gradient and subgradient methods, stochastic gradient descent, duality and
  the KKT conditions, constrained optimization, and Newton and quasi-Newton methods, with
  attention to convergence analysis. It provides the theory behind why and when learning
  algorithms actually converge.
focusAreas:
  - Convex sets & functions
  - Gradient & subgradient methods
  - Stochastic gradient descent
  - Duality & KKT conditions
  - Constrained optimization
  - Newton & quasi-Newton methods
  - Convergence analysis
