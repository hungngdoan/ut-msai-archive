summary: >-
  The foundational survey of how machines learn from data. The course covers the core
  supervised and unsupervised methods that underpin modern AI: linear and logistic
  regression, support vector machines and kernels, tree-based ensembles, clustering, and
  dimensionality reduction, alongside the theory of generalization, the bias-variance
  tradeoff, and rigorous model evaluation.
focusAreas:
  - Supervised learning
  - Unsupervised learning
  - Linear & logistic regression
  - SVMs & kernels
  - Decision trees & ensembles
  - Model evaluation & cross-validation
  - Bias-variance tradeoff
