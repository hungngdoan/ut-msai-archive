code: GEN
title: Advances in Generative Models
catalogNumber: AI 395T
type: elective
hoursPerWeek: "12-15"
semester: spring-2028
status: planned
credits: 3
accent: "#b388ff"
order: 9
summary: >-
  A focused study of models that learn to generate data. The course spans the major
  families: variational autoencoders, generative adversarial networks, normalizing flows,
  autoregressive models, and the score-based and diffusion models behind modern image and
  audio synthesis. It also examines how the quality and diversity of generative models are
  measured and compared.
focusAreas:
  - Variational autoencoders
  - Generative adversarial networks
  - Normalizing flows
  - Autoregressive generation
  - Diffusion & score-based models
  - Evaluation of generative models
tools:
  - PyTorch
  - Hugging Face Diffusers
  - NumPy
  - Weights & Biases
