summary: >-
  The symbolic and search-based side of artificial intelligence. The course covers
  uninformed and heuristic search, A* and admissible heuristics, constraint satisfaction,
  classical planning, and logical knowledge representation, along with adversarial search
  and reasoning under uncertainty. It complements the statistical learning track with the
  deliberative, structure-driven approaches to AI.
focusAreas:
  - Uninformed & heuristic search
  - A* and admissible heuristics
  - Constraint satisfaction
  - Classical planning
  - Knowledge representation & logical reasoning
  - Adversarial search
  - Reasoning under uncertainty
