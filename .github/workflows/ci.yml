name: CI

# Validate every pull request before it can be merged.
# `astro check` enforces the content-collection schemas (the data model),
# and `astro build` proves the site compiles. This is the gate that keeps
# AI-generated or hand-written content edits honest.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check content and components
        run: npm run check
      - name: Build
        run: npm run build:fast
